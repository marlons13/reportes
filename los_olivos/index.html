<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Dashboard Encuesta</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>

<style>
body{
  font-family: Arial;
  background:#f4f6f9;
  margin:0;
}

header{
  background:#1F3864;
  color:white;
  padding:15px;
  text-align:center;
}

.container{
  padding:20px;
  max-width:1200px;
  margin:auto;
}

.card{
  background:white;
  margin-bottom:20px;
  padding:15px;
  border-radius:6px;
  box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

.lista div{
  font-size:14px;
  margin:3px 0;
}

.selector{
  text-align:center;
  margin:15px;
}

select{
  padding:8px;
  font-size:14px;
}
</style>
</head>

<body>

<header>
<h2 id="titulo">📊 Dashboard Encuesta Tecnológica</h2>
</header>

<div class="selector">
  <label><b>Seleccionar aula:</b></label>
  <select id="archivo"></select>
</div>

<div class="container" id="contenido"></div>

<script>

function colores(n){
  const base = [
    '#2E75B6','#ED7D31','#70AD47','#FFC000',
    '#A5A5A5','#4472C4','#255E91','#9E480E',
    '#43682B','#997300'
  ];
  return Array.from({length:n}, (_,i)=> base[i % base.length]);
}

function crearGrafico(id, obj){

  const entries = Object.entries(obj).sort((a,b)=>b[1]-a[1]);
  const labels = entries.map(e=>e[0]);
  const valores = entries.map(e=>e[1]);

  new Chart(document.getElementById(id), {
    type:'bar',
    data:{
      labels: labels,
      datasets:[{
        data: valores,
        backgroundColor: colores(valores.length)
      }]
    },
    options:{
      layout:{
        padding:{
          top: 25   // 🔥 AQUI ESTA LA SOLUCION
        }
      },
      scales:{
        y:{
          beginAtZero:true,
          grace: '10%'   // 🔥 agrega espacio arriba de la barra
        }
      },
      plugins:{ 
        legend:{display:false} 
      }
    },
    plugins: [{
      afterDatasetsDraw(chart){
        const {ctx} = chart;
        ctx.save();

        chart.getDatasetMeta(0).data.forEach((bar, index)=>{
          const value = valores[index];

          ctx.fillStyle = "#000";
          ctx.font = "12px Arial";
          ctx.textAlign = "center";

          ctx.fillText(value, bar.x, bar.y - 8); // 🔥 un poco más arriba
        });
      }
    }]
  });
}
async function cargar(archivo){

  const res = await fetch(`json/${archivo}`);
  const data = await res.json();

  document.getElementById("titulo").innerText =
    `📊 Dashboard (${archivo}) - ${data.total} estudiantes`;

  const preguntas = [
    {titulo:"📱 Dispositivos", key:"dispositivos"},
    {titulo:"⏱ Horas en dispositivos", key:"horas"},
    {titulo:"🎯 Uso de dispositivos", key:"uso"},
    {titulo:"📚 Uso para estudiar", key:"estudio"},
    {titulo:"🌐 Redes sociales", key:"redes"},
    {titulo:"⏳ Horas en redes", key:"horas_redes"},
    {titulo:"💬 Uso de redes", key:"uso_redes"}
  ];

  const contenedor = document.getElementById("contenido");
  contenedor.innerHTML = ""; // limpiar

  preguntas.forEach((p, i)=>{

    const id = "chart"+i;

    const card = document.createElement("div");
    card.className = "card";

    card.innerHTML = `
      <h3>${p.titulo}</h3>
      <canvas id="${id}"></canvas>
      <div class="lista" id="lista${i}"></div>
    `;

    contenedor.appendChild(card);

    const obj = data[p.key];

    crearGrafico(id, obj);

    let html="";
const ordenado = Object.entries(obj).sort((a,b)=>b[1]-a[1]);

const coloresLista = colores(ordenado.length);

ordenado.forEach(([k,v], i)=>{
  html += `
    <div style="display:flex; align-items:center; gap:8px;">
      <div style="width:12px;height:12px;background:${coloresLista[i]};border-radius:2px;"></div>
      ${k}: <b>${v}</b>
    </div>
  `;
});

    document.getElementById("lista"+i).innerHTML = html;

  });

}

async function cargarArchivos(){

  const res = await fetch("json/lista_archivos.json");
  const archivos = await res.json();

  const select = document.getElementById("archivo");

  select.innerHTML = ""; // limpiar por si acaso

  archivos.forEach(a=>{
    select.innerHTML += `<option value="${a}">${a.replace(".json","")}</option>`;
  });

  select.addEventListener("change", ()=>{
    cargar(select.value);
  });

  // cargar primero automáticamente
  if(archivos.length > 0){
    cargar(archivos[0]);
  }

}

cargarArchivos();

</script>

</body>
</html>
